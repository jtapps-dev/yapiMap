<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6C8"/>
      <stop offset="100%" style="stop-color:#EDD5A0"/>
    </linearGradient>
  </defs>
  <!-- Room background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Floor -->
  <rect x="0" y="360" width="800" height="140" fill="#C8A96E"/>
  <!-- Floor tiles -->
  <line x1="0" y1="390" x2="800" y2="390" stroke="#B8995E" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#B8995E" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#B8995E" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="360" x2="100" y2="500" stroke="#B8995E" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="360" x2="200" y2="500" stroke="#B8995E" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="360" x2="300" y2="500" stroke="#B8995E" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="360" x2="400" y2="500" stroke="#B8995E" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="360" x2="500" y2="500" stroke="#B8995E" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="360" x2="600" y2="500" stroke="#B8995E" stroke-width="1" opacity="0.5"/>
  <line x1="700" y1="360" x2="700" y2="500" stroke="#B8995E" stroke-width="1" opacity="0.5"/>
  <!-- Wall -->
  <rect x="0" y="0" width="800" height="370" fill="#F5ECD0"/>
  <!-- Large window -->
  <rect x="120" y="60" width="300" height="250" rx="4" fill="#87CEEB" opacity="0.6"/>
  <rect x="120" y="60" width="300" height="250" rx="4" fill="none" stroke="#C8A96E" stroke-width="8"/>
  <line x1="270" y1="60" x2="270" y2="310" stroke="#C8A96E" stroke-width="4"/>
  <line x1="120" y1="185" x2="420" y2="185" stroke="#C8A96E" stroke-width="4"/>
  <!-- Sea view through window -->
  <rect x="124" y="200" width="292" height="106" fill="#2980B9" opacity="0.5"/>
  <rect x="124" y="64" width="292" height="118" fill="#87CEEB" opacity="0.8"/>
  <!-- Sofa -->
  <rect x="460" y="270" width="280" height="90" rx="10" fill="#8B6914"/>
  <rect x="460" y="260" width="280" height="30" rx="6" fill="#9B7924"/>
  <rect x="460" y="260" width="30" height="100" rx="6" fill="#9B7924"/>
  <rect x="710" y="260" width="30" height="100" rx="6" fill="#9B7924"/>
  <!-- Pillows -->
  <rect x="500" y="265" width="60" height="40" rx="8" fill="#E8B84B" opacity="0.9"/>
  <rect x="580" y="265" width="60" height="40" rx="8" fill="#E8B84B" opacity="0.7"/>
  <rect x="660" y="265" width="60" height="40" rx="8" fill="#D4A030" opacity="0.8"/>
  <!-- Coffee table -->
  <rect x="500" y="355" width="200" height="15" rx="4" fill="#6B4F12"/>
  <rect x="510" y="365" width="10" height="20" fill="#6B4F12"/>
  <rect x="680" y="365" width="10" height="20" fill="#6B4F12"/>
  <!-- Plant -->
  <rect x="55" y="310" width="20" height="50" fill="#8B6914"/>
  <circle cx="65" cy="290" r="35" fill="#2ECC71" opacity="0.8"/>
  <circle cx="45" cy="305" r="20" fill="#27AE60" opacity="0.8"/>
  <circle cx="85" cy="300" r="22" fill="#2ECC71" opacity="0.7"/>
  <!-- Label -->
  <rect x="20" y="20" width="200" height="50" rx="8" fill="#0F1923" opacity="0.85"/>
  <text x="120" y="42" font-family="Arial" font-weight="bold" font-size="13" fill="#E8B84B" text-anchor="middle">OTURMA ODASI</text>
  <text x="120" y="60" font-family="Arial" font-size="11" fill="#94A3B8" text-anchor="middle">Deniz Manzaralı</text>
</svg>