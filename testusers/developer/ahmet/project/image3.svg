<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="poolbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8"/>
      <stop offset="100%" style="stop-color:#D0EAF5"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2"/>
      <stop offset="100%" style="stop-color:#2E86C1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#poolbg)"/>
  <!-- Sky -->
  <rect x="0" y="0" width="800" height="200" fill="#87CEEB" opacity="0.4"/>
  <!-- Ground/Terrace -->
  <rect x="0" y="320" width="800" height="180" fill="#E8D5B0"/>
  <!-- Pool -->
  <rect x="80" y="200" width="500" height="200" rx="20" fill="url(#water)"/>
  <!-- Pool shimmer -->
  <ellipse cx="200" cy="250" rx="60" ry="15" fill="white" opacity="0.15"/>
  <ellipse cx="400" cy="300" rx="80" ry="12" fill="white" opacity="0.1"/>
  <ellipse cx="500" cy="230" rx="40" ry="10" fill="white" opacity="0.12"/>
  <!-- Pool border -->
  <rect x="80" y="200" width="500" height="200" rx="20" fill="none" stroke="#F5E6C8" stroke-width="8"/>
  <!-- Lounge chairs -->
  <rect x="620" y="240" width="120" height="45" rx="8" fill="#E8B84B" opacity="0.9"/>
  <rect x="620" y="235" width="35" height="20" rx="4" fill="#D4A030"/>
  <rect x="620" y="300" width="120" height="45" rx="8" fill="#E8B84B" opacity="0.8"/>
  <rect x="620" y="295" width="35" height="20" rx="4" fill="#D4A030"/>
  <!-- Umbrella -->
  <line x1="700" y1="210" x2="700" y2="280" stroke="#8B6914" stroke-width="4"/>
  <ellipse cx="700" cy="210" rx="50" ry="20" fill="#E8B84B" opacity="0.9"/>
  <!-- Palm trees -->
  <line x1="50" y1="320" x2="60" y2="180" stroke="#6B4F12" stroke-width="10"/>
  <ellipse cx="50" cy="175" rx="40" ry="20" fill="#27AE60" opacity="0.9" transform="rotate(-20,50,175)"/>
  <ellipse cx="70" cy="165" rx="45" ry="18" fill="#2ECC71" opacity="0.8" transform="rotate(15,70,165)"/>
  <ellipse cx="35" cy="160" rx="35" ry="15" fill="#27AE60" opacity="0.7" transform="rotate(-40,35,160)"/>
  <line x1="750" y1="320" x2="740" y2="170" stroke="#6B4F12" stroke-width="10"/>
  <ellipse cx="755" cy="165" rx="42" ry="18" fill="#27AE60" opacity="0.9" transform="rotate(20,755,165)"/>
  <ellipse cx="730" cy="158" rx="38" ry="16" fill="#2ECC71" opacity="0.8" transform="rotate(-15,730,158)"/>
  <!-- Mountains in background -->
  <polygon points="0,200 100,120 200,200" fill="#7D9B76" opacity="0.3"/>
  <polygon points="550,200 700,100 850,200" fill="#5D7A56" opacity="0.3"/>
  <!-- Label -->
  <rect x="20" y="20" width="200" height="50" rx="8" fill="#0F1923" opacity="0.85"/>
  <text x="120" y="42" font-family="Arial" font-weight="bold" font-size="13" fill="#E8B84B" text-anchor="middle">YÜZME HAVUZU</text>
  <text x="120" y="60" font-family="Arial" font-size="11" fill="#94A3B8" text-anchor="middle">Ortak Alan</text>
</svg>