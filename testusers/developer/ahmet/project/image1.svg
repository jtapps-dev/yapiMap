<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Sky -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F0FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="building" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C49533;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2980B9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A5276;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Sea -->
  <rect x="0" y="340" width="800" height="160" fill="url(#sea)" opacity="0.7"/>
  <!-- Mountains -->
  <polygon points="0,300 120,180 240,300" fill="#7D9B76" opacity="0.6"/>
  <polygon points="100,300 250,160 400,300" fill="#5D7A56" opacity="0.7"/>
  <polygon points="400,300 580,140 760,300" fill="#4A6645" opacity="0.6"/>
  <!-- Main Building -->
  <rect x="200" y="120" width="180" height="220" rx="4" fill="url(#building)"/>
  <!-- Windows -->
  <rect x="220" y="140" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.8"/>
  <rect x="265" y="140" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.8"/>
  <rect x="310" y="140" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.8"/>
  <rect x="220" y="180" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.9"/>
  <rect x="265" y="180" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.9"/>
  <rect x="310" y="180" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.9"/>
  <rect x="220" y="220" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.8"/>
  <rect x="265" y="220" width="30" height="25" rx="3" fill="#FFD700" opacity="0.9"/>
  <rect x="310" y="220" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.8"/>
  <rect x="220" y="260" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.8"/>
  <rect x="265" y="260" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.8"/>
  <rect x="310" y="260" width="30" height="25" rx="3" fill="#B8D4E8" opacity="0.8"/>
  <!-- Second Building -->
  <rect x="420" y="160" width="140" height="180" rx="4" fill="#C49533" opacity="0.9"/>
  <rect x="435" y="175" width="25" height="20" rx="2" fill="#B8D4E8" opacity="0.8"/>
  <rect x="470" y="175" width="25" height="20" rx="2" fill="#B8D4E8" opacity="0.8"/>
  <rect x="505" y="175" width="25" height="20" rx="2" fill="#B8D4E8" opacity="0.8"/>
  <rect x="435" y="210" width="25" height="20" rx="2" fill="#B8D4E8" opacity="0.8"/>
  <rect x="470" y="210" width="25" height="20" rx="2" fill="#FFD700" opacity="0.9"/>
  <rect x="505" y="210" width="25" height="20" rx="2" fill="#B8D4E8" opacity="0.8"/>
  <rect x="435" y="245" width="25" height="20" rx="2" fill="#B8D4E8" opacity="0.8"/>
  <rect x="470" y="245" width="25" height="20" rx="2" fill="#B8D4E8" opacity="0.8"/>
  <rect x="505" y="245" width="25" height="20" rx="2" fill="#B8D4E8" opacity="0.8"/>
