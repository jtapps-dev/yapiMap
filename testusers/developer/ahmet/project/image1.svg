  <rect x="0" y="335" width="800" height="20" fill="#5D8A3C"/>
  <circle cx="180" cy="330" r="25" fill="#4A7A2C"/>
  <circle cx="600" cy="328" r="30" fill="#4A7A2C"/>
  <circle cx="650" cy="332" r="20" fill="#3D6A22"/>
