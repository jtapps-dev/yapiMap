<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8A93A"/>
      <stop offset="100%" stop-color="#8B7320"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5D35"/>
      <stop offset="100%" stop-color="#1a3a1f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="60" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="200" cy="70" rx="45" ry="20" fill="white" opacity="0.7"/>
  <ellipse cx="600" cy="100" rx="70" ry="28" fill="white" opacity="0.6"/>
  <ellipse cx="650" cy="90" rx="50" ry="22" fill="white" opacity="0.6"/>
  <!-- Bosphorus water -->
  <rect x="0" y="350" width="800" height="80" fill="#1E6B9B" opacity="0.8"/>
  <rect x="0" y="360" width="800" height="4" fill="#5BA3C9" opacity="0.5"/>
  <rect x="0" y="375" width="800" height="3" fill="#5BA3C9" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="400" width="800" height="100" fill="url(#ground)"/>
  <!-- Main tower -->
  <rect x="300" y="100" width="200" height="300" fill="url(#building)" rx="4"/>
  <!-- Windows grid on tower -->
  <g fill="#1E2D3D" opacity="0.8">
    <rect x="315" y="115" width="20" height="15" rx="2"/>
    <rect x="345" y="115" width="20" height="15" rx="2"/>
    <rect x="375" y="115" width="20" height="15" rx="2"/>
    <rect x="405" y="115" width="20" height="15" rx="2"/>
    <rect x="435" y="115" width="20" height="15" rx="2"/>
    <rect x="465" y="115" width="20" height="15" rx="2"/>

    <rect x="315" y="140" width="20" height="15" rx="2"/>
    <rect x="345" y="140" width="20" height="15" rx="2"/>
    <rect x="375" y="140" width="20" height="15" rx="2"/>
    <rect x="405" y="140" width="20" height="15" rx="2"/>
    <rect x="435" y="140" width="20" height="15" rx="2"/>
    <rect x="465" y="140" width="20" height="15" rx="2"/>

    <rect x="315" y="165" width="20" height="15" rx="2"/>
    <rect x="345" y="165" width="20" height="15" rx="2"/>
    <rect x="375" y="165" width="20" height="15" rx="2"/>
    <rect x="405" y="165" width="20" height="15" rx="2"/>
    <rect x="435" y="165" width="20" height="15" rx="2"/>
    <rect x="465" y="165" width="20" height="15" rx="2"/>

    <rect x="315" y="190" width="20" height="15" rx="2"/>
    <rect x="345" y="190" width="20" height="15" rx="2"/>
    <rect x="375" y="190" width="20" height="15" rx="2"/>
    <rect x="405" y="190" width="20" height="15" rx="2"/>
    <rect x="435" y="190" width="20" height="15" rx="2"/>
    <rect x="465" y="190" width="20" height="15" rx="2"/>

    <rect x="315" y="215" width="20" height="15" rx="2"/>
    <rect x="345" y="215" width="20" height="15" rx="2"/>
    <rect x="375" y="215" width="20" height="15" rx="2"/>
    <rect x="405" y="215" width="20" height="15" rx="2"/>
    <rect x="435" y="215" width="20" height="15" rx="2"/>
    <rect x="465" y="215" width="20" height="15" rx="2"/>
  </g>
  <!-- Lit windows (yellow) -->
  <g fill="#E8B84B" opacity="0.9">
    <rect x="315" y="240" width="20" height="15" rx="2"/>
    <rect x="375" y="240" width="20" height="15" rx="2"/>
    <rect x="435" y="240" width="20" height="15" rx="2"/>
    <rect x="345" y="265" width="20" height="15" rx="2"/>
    <rect x="405" y="265" width="20" height="15" rx="2"/>
    <rect x="465" y="265" width="20" height="15" rx="2"/>
    <rect x="315" y="290" width="20" height="15" rx="2"/>
    <rect x="405" y="290" width="20" height="15" rx="2"/>
  </g>
  <!-- Diamond logo on top -->
  <polygon points="400,85 415,100 400,115 385,100" fill="#E8B84B"/>
  <!-- Side buildings -->
  <rect x="180" y="200" width="110" height="200" fill="#8B7320" opacity="0.7" rx="3"/>
  <rect x="510" y="220" width="110" height="180" fill="#8B7320" opacity="0.7" rx="3"/>
  <!-- Trees -->
  <ellipse cx="260" cy="398" rx="30" ry="20" fill="#2E7D32"/>
  <rect x="257" y="398" width="6" height="15" fill="#5D4037"/>
  <ellipse cx="540" cy="395" rx="35" ry="22" fill="#2E7D32"/>
  <rect x="537" y="398" width="6" height="15" fill="#5D4037"/>
  <!-- Label -->
  <rect x="0" y="440" width="800" height="60" fill="rgba(15,25,35,0.85)"/>
  <text x="400" y="468" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#E8B84B">DIAMOND CITY</text>
  <text x="400" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" letter-spacing="3">KADIKÖY · İSTANBUL</text>
</svg>