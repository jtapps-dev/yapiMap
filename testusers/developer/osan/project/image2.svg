<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4C5A0"/>
      <stop offset="100%" stop-color="#B8A880"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#E8E0D0"/>
    </linearGradient>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F4FF"/>
    </linearGradient>
  </defs>
  <!-- Background wall -->
  <rect width="800" height="500" fill="url(#wall)"/>
  <!-- Floor -->
  <polygon points="0,380 800,380 800,500 0,500" fill="url(#floor)"/>
  <!-- Floor lines perspective -->
  <line x1="0" y1="380" x2="800" y2="380" stroke="#C4B090" stroke-width="1"/>
  <line x1="0" y1="410" x2="800" y2="410" stroke="#C4B090" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="445" x2="800" y2="445" stroke="#C4B090" stroke-width="0.5" opacity="0.5"/>
  <!-- Large panoramic window -->
  <rect x="150" y="60" width="500" height="280" fill="url(#sky2)" rx="4"/>
  <rect x="150" y="60" width="500" height="280" fill="none" stroke="#C9A840" stroke-width="6" rx="4"/>
  <!-- Window frame cross -->
  <line x1="400" y1="60" x2="400" y2="340" stroke="#C9A840" stroke-width="4"/>
  <line x1="150" y1="200" x2="650" y2="200" stroke="#C9A840" stroke-width="4"/>
  <!-- View through window: Istanbul skyline -->
  <rect x="156" y="220" width="488" height="114" fill="#1E6B9B" opacity="0.4"/>
  <rect x="200" y="150" width="60" height="70" fill="#8B7320" opacity="0.3" rx="2"/>
  <rect x="310" y="120" width="80" height="80" fill="#8B7320" opacity="0.3" rx="2"/>
  <rect x="450" y="140" width="65" height="60" fill="#8B7320" opacity="0.3" rx="2"/>
  <!-- Mosque silhouette -->
  <path d="M340,180 L350,120 L360,180Z" fill="#5D4E2A" opacity="0.4"/>
  <ellipse cx="350" cy="118" rx="12" ry="10" fill="#5D4E2A" opacity="0.4"/>
  <!-- Sofa -->
  <rect x="200" y="330" width="400" height="60" fill="#5D4037" rx="8"/>
  <rect x="200" y="310" width="400" height="25" fill="#6D4C41" rx="8"/>
  <rect x="200" y="310" width="25" height="80" fill="#6D4C41" rx="4"/>
  <rect x="575" y="310" width="25" height="80" fill="#6D4C41" rx="4"/>
  <!-- Cushions -->
  <rect x="225" y="315" width="80" height="20" fill="#E8B84B" rx="4" opacity="0.8"/>
  <rect x="350" y="315" width="80" height="20" fill="#E8B84B" rx="4" opacity="0.8"/>
  <rect x="475" y="315" width="80" height="20" fill="#C9A840" rx="4" opacity="0.8"/>
  <!-- Coffee table -->
  <rect x="300" y="370" width="200" height="10" fill="#3E2723" rx="3"/>
  <rect x="310" y="380" width="10" height="20" fill="#3E2723"/>
  <rect x="480" y="380" width="10" height="20" fill="#3E2723"/>
  <!-- Label -->
  <rect x="0" y="450" width="800" height="50" fill="rgba(15,25,35,0.85)"/>
  <text x="400" y="473" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#E8B84B">LIVING ROOM — BOSPHORUS VIEW</text>
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" letter-spacing="2">DIAMOND CITY · INTERIOR</text>
</svg>